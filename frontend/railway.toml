$schema = "https://railway.com/railway.schema.json"

[build]
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/bin/sh -c \"envsubst '$BACKEND_URL' < /etc/nginx/conf.d/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'\""
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
